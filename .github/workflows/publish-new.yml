name: Publish new SDK release from production branch (minor version bump)
# This bumps the version, updates the changelogs, publishes a GitHub release, and publishes the packages to npm.

# Prevent more than one non-canary npm publishing job from running at the same time
concurrency:
  group: npm-publish

# Package publishing is manually triggered on github actions dashboard
on:
  workflow_dispatch:
    inputs:
      bump_type:
        type: choice
        description: Version Bump Type
        required: true
        default: 'minor'
        options:
          - minor
          - major
          - override
      version_override:
        type: string
        description: Version Override
        required: false

defaults:
  run:
    shell: bash

permissions:
  contents: read
  id-token: write

jobs:
  check:
    name: Check inputs and branch
    runs-on: ubuntu-latest
    steps:
      - name: Check inputs
        run: |
          if [[ "${{ inputs.bump_type }}" != "override" ]] && ! [[ -z "${{ inputs.version_override }}" ]]; then
            echo "ERROR You must set the Bump Type to 'override' if you supply a custom version number override."
            exit 1
          fi
      - name: Check branch
        run: |
          if [[ "${{ github.ref_name }}" != "production" ]]; then
            echo "ERROR You must be on the production branch to publish a new version."
            exit 1
          fi

  publish:
    name: 'Publish new version of public packages'
    needs: check
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      publish-command: ${{ inputs.bump_type == 'override' && format('yarn tsx ./internal/scripts/publish-new.ts --bump {0}', inputs.version_override) || format('yarn tsx ./internal/scripts/publish-new.ts --bump {0}', inputs.bump_type) }}
      bemo-url: https://demo.tldraw.xyz
      use-huppy-token: true

  publish_templates:
    name: Publishes code templates to separate repositories
    uses: tldraw/tldraw/.github/workflows/publish-templates.yml@main
    secrets:
      HUPPY_PRIVATE_KEY: ${{ secrets.HUPPY_PRIVATE_KEY }}
      HUPPY_APP_ID: ${{ vars.HUPPY_APP_ID }}
      DISCORD_DEPLOY_WEBHOOK_URL: ${{ secrets.DISCORD_DEPLOY_WEBHOOK_URL }}
    needs: [publish]
