name: End to end tests (examples)

on:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CI: 1
  PRINT_GITHUB_ANNOTATIONS: 1

defaults:
  run:
    shell: bash

jobs:
  build:
    name: 'End to end tests (examples)'
    timeout-minutes: 60
    runs-on: ubuntu-latest-16-cores-open

    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Run our setup
        uses: ./.github/actions/setup

      - name: Get installed Playwright version
        id: playwright-version
        run: |
          cd apps/examples
          yarn info @playwright/test --json > playwright.json
          echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./playwright.json').children.Version)")" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Check for Playwright browsers cache
        id: playwright-cache
        with:
          path: |
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium chrome
        if: steps.playwright-cache.outputs.cache-hit != 'true'

      - name: Start dev server
        run: |
          yarn workspace examples.tldraw.com dev &
          for i in {1..60}; do curl -sf http://localhost:5420 > /dev/null && break; sleep 2; done

      - name: Run Playwright tests (3 shards in parallel)
        run: |
          (PLAYWRIGHT_BLOB_OUTPUT_DIR=blob-reports/shard-1 PARALLEL_SHARDS=1 yarn workspace examples.tldraw.com e2e --shard=1/3 --workers=4) &
          (PLAYWRIGHT_BLOB_OUTPUT_DIR=blob-reports/shard-2 PARALLEL_SHARDS=1 yarn workspace examples.tldraw.com e2e --shard=2/3 --workers=4) &
          (PLAYWRIGHT_BLOB_OUTPUT_DIR=blob-reports/shard-3 PARALLEL_SHARDS=1 yarn workspace examples.tldraw.com e2e --shard=3/3 --workers=4) &
          wait
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}

      - name: Merge Playwright reports
        run: npx playwright merge-reports --reporter=html ./blob-reports/shard-1 ./blob-reports/shard-2 ./blob-reports/shard-3
        working-directory: apps/examples

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/examples/playwright-report
          retention-days: 30

      - uses: shallwefootball/s3-upload-action@master
        env:
          HAS_AWS_KEY: ${{ secrets.AWS_S3_SECRET_KEY && '1' || '' }}
        if: always() && env.HAS_AWS_KEY == '1'
        name: Upload S3
        id: s3
        with:
          aws_key_id: ${{ secrets.AWS_S3_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_S3_SECRET_KEY}}
          aws_bucket: playwright.tldraw.xyz
          source_dir: apps/examples/playwright-report

      - name: Log report to summary
        if: always()
        run: |
          report_url="https://playwright.tldraw.xyz/${{ steps.s3.outputs.object_key }}/index.html"
          echo "Report: $report_url"
          echo "## Playwright report" >> $GITHUB_STEP_SUMMARY
          echo "* $report_url" >> $GITHUB_STEP_SUMMARY
