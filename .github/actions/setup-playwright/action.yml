name: 'Setup Playwright'
description: 'Install Playwright browsers with version-keyed caching shared across workflows.'

inputs:
  browsers:
    description: 'Space-separated Playwright browsers to install.'
    required: false
    # Only bundled Chromium by default — every e2e project uses `devices['Desktop Chrome']` /
    # `['Pixel 5']` with no `channel`, so the branded `chrome` build is never launched.
    default: 'chromium'

runs:
  using: 'composite'
  steps:
    # @playwright/test is hoisted to the root node_modules (it's a devDependency of the e2e
    # workspaces), so Node resolves it from the repo root — no per-workspace cwd, nothing written
    # to the tree.
    - name: Resolve Playwright version
      shell: bash
      run: echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"

    # Keyed on os + arch + version only — deliberately NOT on the browser set. That's the key the
    # e2e workflows have always used, so every job (including this snapshot workflow) shares one
    # warm cache and skips the install. Browser-keying would be more correct, but it forces a cold
    # `playwright install`, which currently hangs at "extracting archive" on the larger runners
    # (the download finishes, then the unzip wedges to the job timeout). Until that's fixed, a cold
    # install is best avoided; see the PR description.
    - name: Check for Playwright browsers cache
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    # Cache miss only. No `--with-deps`: that runs apt (which hangs on the runner's dpkg lock), and
    # the runner images already ship Chromium's system libraries — cache-hit runs skip this step
    # entirely and still launch the browser.
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: npx playwright install $BROWSERS
