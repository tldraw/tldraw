name: 'Setup Playwright'
description: 'Install Playwright browsers with version-keyed caching shared across workflows.'

inputs:
  browsers:
    description: 'Space-separated Playwright browsers to install and cache.'
    required: false
    # Only bundled Chromium by default — every e2e project uses `devices['Desktop Chrome']` /
    # `['Pixel 5']` with no `channel`, so the branded `chrome` build is never launched.
    default: 'chromium'

runs:
  using: 'composite'
  steps:
    # @playwright/test is hoisted to the root node_modules (it's a devDependency of the e2e
    # workspaces), so Node resolves it from the repo root — no per-workspace cwd, nothing written
    # to the tree. We also derive a key-safe browser token (spaces -> dashes) so multi-browser
    # values like "chromium firefox" don't put a space in the cache key.
    - name: Resolve Playwright version and browsers
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: |
        echo "PLAYWRIGHT_VERSION=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_ENV"
        echo "PLAYWRIGHT_BROWSERS_KEY=$(echo "$BROWSERS" | tr ' ' '-')" >> "$GITHUB_ENV"

    # Keyed on os + arch + version + browsers. The arch matters (ARM vs x64 need different
    # binaries); the browser set matters too — without it, adding a browser would be a stale cache
    # hit that skips the install and never downloads the new one.
    - name: Check for Playwright browsers cache
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.cache/ms-playwright
        key: ${{ runner.os }}-${{ runner.arch }}-playwright-${{ env.PLAYWRIGHT_VERSION }}-${{ env.PLAYWRIGHT_BROWSERS_KEY }}

    # Cache miss only. No `--with-deps`: GitHub's runner images already ship Chromium's system
    # libraries (both cache-hit runs and a cold deps-free install launch the browser and pass), so
    # the apt step is redundant and only risks stalling on the runner's dpkg lock. If a
    # non-Chromium browser (webkit/firefox) is ever added via `browsers`, install its deps then.
    - name: Install Playwright browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      shell: bash
      env:
        BROWSERS: ${{ inputs.browsers }}
      run: npx playwright install $BROWSERS
