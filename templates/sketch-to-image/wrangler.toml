
name = "sketch-to-image-template"
main = "worker/worker.ts"
compatibility_date = "2025-05-08"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true
preview_urls = true

[[routes]]
pattern = "sketch-to-image.templates.tldraw.dev"
custom_domain = true

[observability]
enabled = true

[assets]
not_found_handling = "single-page-application"
directory = "./dist/client"

# fal.ai API key. This is used to authenticate realtime and REST requests to
# fal.ai. The key never reaches the browser — the worker proxies requests and
# injects it.
#
# Set for deployment with: wrangler secret put FAL_KEY
# For local development, create a .dev.vars file in this directory:
#   FAL_KEY=...
#
# Anthropic API key. Used by /api/describe to auto-write an image prompt from
# the sketch (Claude vision), so the user doesn't have to type one. Also injected
# server-side and never reaches the browser.
#
# Set for deployment with: wrangler secret put ANTHROPIC_API_KEY
# For local development, add it to the same .dev.vars file:
#   ANTHROPIC_API_KEY=...
