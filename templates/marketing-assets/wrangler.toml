
name = "marketing-assets-template"
main = "worker/worker.ts"
compatibility_date = "2025-05-08"
compatibility_flags = ["nodejs_compat"]
upload_source_maps = true
preview_urls = true

[[routes]]
pattern = "marketing-assets.templates.tldraw.dev"
custom_domain = true

[observability]
enabled = true

[assets]
not_found_handling = "single-page-application"
directory = "./dist/client"

# Environment variables for AI provider API keys.
# Set these in production with:
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put GOOGLE_API_KEY
# For local development, create a .dev.vars file (see .dev.vars.example):
#   ANTHROPIC_API_KEY=...
#   GOOGLE_API_KEY=...

# Each room is hosted in a durable object. Room data is stored in the durable
# object's SQLite storage.
[durable_objects]
bindings = [{ name = "TLDRAW_DURABLE_OBJECT", class_name = "TldrawDurableObject" }]

# Durable objects require migrations to create/modify/delete them.
# new_sqlite_classes opts the class into SQLite-backed storage.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["TldrawDurableObject"]

# Generated backgrounds and any dropped media are stored in an R2 bucket so they
# don't get synced inline through the room as large data URLs.
[[r2_buckets]]
binding = 'TLDRAW_BUCKET'
bucket_name = 'marketing-assets-template'
preview_bucket_name = 'marketing-assets-template-preview'
