<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px;
    height: 900px;
    background: white;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .card .logo {
    width: 480px;
    margin-bottom: 48px;
  }
  .card .title {
    font-size: 36px;
    color: rgba(0, 0, 0, 0.55);
    font-weight: 400;
    text-align: center;
    max-width: 800px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="tldraw.svg" />
    <div class="title">ci: run lint in parallel with typecheck</div>
  </div>
</body>
</html>
