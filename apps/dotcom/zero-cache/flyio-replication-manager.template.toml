app = "__APP_NAME"
primary_region = "fra"
kill_timeout = "__KILL_TIMEOUT"

[build]
image = "registry.hub.docker.com/rocicorp/zero:__ZERO_VERSION"

[checks]
  [checks.keepalive]
  type = "http"
  port = 4849
  grace_period = "30s"
  interval = "5s"
  timeout = "5s"
  path = "/keepalive"

[[restart]]
policy = "always"

[[vm]]
memory = "__VM_MEMORY"
cpu_kind = "__CPU_KIND"
cpus = __VM_CPUS

[mounts]
source = "sqlite_repl"
destination = "/data"
initial_size = "__VOLUME_SIZE"

[env]
ZERO_REPLICA_FILE = "/data/sync-replica.db"
ZERO_APP_PUBLICATIONS = "zero_data"
ZERO_NUM_SYNC_WORKERS = "0"
ZERO_UPSTREAM_MAX_CONNS = "__RM_UPSTREAM_MAX_CONNS"
ZERO_CVR_MAX_CONNS = "__RM_CVR_MAX_CONNS"
ZERO_CHANGE_MAX_CONNS = "__RM_CHANGE_MAX_CONNS"
ZERO_LITESTREAM_BACKUP_URL = "s3://__ZERO_R2_BUCKET_NAME/__BACKUP_PATH"
ZERO_LITESTREAM_ENDPOINT = "__ZERO_R2_ENDPOINT"
ZERO_LOG_LEVEL = "debug"
DO_NOT_TRACK = "1"
OTEL_NODE_RESOURCE_DETECTORS = "env,host,os"
OTEL_RESOURCE_ATTRIBUTES = "service.name=zero-rm,service.namespace=dotcom,deployment.environment=__TLDRAW_ENV,service.version=__ZERO_VERSION"
