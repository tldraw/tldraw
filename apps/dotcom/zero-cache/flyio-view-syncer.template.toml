app = "__APP_NAME"
primary_region = "fra"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 4848
force_https = true
auto_stop_machines = "off"
min_machines_running = 2

[[http_service.http_options.replay_cache]]
path_prefix = "/"
ttl_seconds = 3600
type = "cookie"
name = "fly_machine_id"

[[http_service.checks]]
grace_period = "10s"
interval = "30s"
method = "GET"
timeout = "5s"
path = "/"

[[vm]]
memory = "__VM_MEMORY"
cpu_kind = "__CPU_KIND"
cpus = __VM_CPUS

[mounts]
source = "sqlite_db"
destination = "/data"
initial_size = "__VOLUME_SIZE"

[env]
ZERO_REPLICA_FILE = "/data/sync-replica.db"
ZERO_APP_PUBLICATIONS = "zero_data"
ZERO_CHANGE_STREAMER_URI = "__REPLICATION_MANAGER_URI"
ZERO_MUTATE_URL = "__ZERO_MUTATE_URL"
ZERO_QUERY_URL = "__ZERO_QUERY_URL"
ZERO_ENABLE_CRUD_MUTATIONS = "false"
ZERO_UPSTREAM_MAX_CONNS = "__VS_UPSTREAM_MAX_CONNS"
ZERO_CVR_MAX_CONNS = "__VS_CVR_MAX_CONNS"
ZERO_CHANGE_MAX_CONNS = "__VS_CHANGE_MAX_CONNS"
ZERO_LOG_LEVEL = "debug"
DO_NOT_TRACK = "1"
OTEL_NODE_RESOURCE_DETECTORS = "env,host,os"
OTEL_RESOURCE_ATTRIBUTES = "service.name=zero-vs,service.namespace=dotcom,deployment.environment=__TLDRAW_ENV,service.version=__ZERO_VERSION"
ZERO_LITESTREAM_CONFIG_PATH = "/etc/litestream.yml"
ZERO_LITESTREAM_BACKUP_URL = "s3://__ZERO_R2_BUCKET_NAME/__BACKUP_PATH"
ZERO_LITESTREAM_ENDPOINT = "__ZERO_R2_ENDPOINT"
