# ============================================================================
# SPIKE: host-native dev orchestration of the dotcom dev stack via process-compose
# ============================================================================
# Now PARAMETERIZED for parallel worktrees: every port + URL comes from env vars that
# internal/scripts/dotcom-dev-parallel.ts computes from a per-worktree 100-port block.
# Run via `yarn dev-app` (which runs that script, which execs this with the block's env).
# Block 0 == the natural ports, so a single worktree is unchanged.
#
# The ${VAR}s below are expanded by the shell process-compose runs each command in, using the
# environment the wrapper sets. Non-port settings come from the wrapper env via inheritance.
# See README.process-compose.md (#9301) and the "parallel worktrees" section there.

version: '0.5'

processes:
  # --- Postgres: own docker compose PROJECT + published ports per worktree (so volumes + ports
  #     don't clash). This part actually gets container isolation for free; the host processes don't. ---
  postgres:
    command: docker compose -p ${COMPOSE_PROJECT_NAME} -f apps/dotcom/zero-cache/docker/docker-compose.yml up
    shutdown:
      command: docker compose -p ${COMPOSE_PROJECT_NAME} -f apps/dotcom/zero-cache/docker/docker-compose.yml down
    readiness_probe:
      exec:
        command: node -e "require('net').connect(${PG_PORT},'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30

  bundle-schema:
    command: yarn workspace @tldraw/zero-cache bundle-schema
    availability:
      restart: 'no'

  schema-watch:
    command: yarn workspace @tldraw/zero-cache bundle-schema:watch
    depends_on:
      bundle-schema:
        condition: process_completed_successfully

  # migrate against DIRECT postgres (not pgbouncer) — point the var migrate.ts reads at PG_PORT.
  migrate:
    command: BOTCOM_POSTGRES_POOLED_CONNECTION_STRING="$BOTCOM_POSTGRES_CONNECTION_STRING" yarn workspace @tldraw/zero-cache migrate
    depends_on:
      postgres:
        condition: process_healthy
    availability:
      restart: 'no'

  # zero-cache reads --port from ZERO_PORT (and binds +1/+2), and ZERO_*_DB / ZERO_*_URL /
  # ZERO_REPLICA_FILE from the wrapper env. Only the static settings are listed here.
  zero-cache:
    command: yarn workspace @tldraw/zero-cache exec nodemon --watch ./.schema.js --exec zero-cache-dev --signal SIGINT
    environment:
      - ZERO_NUM_SYNC_WORKERS=1
      - ZERO_APP_PUBLICATIONS=zero_data
      - ZERO_ENABLE_CRUD_MUTATIONS=false
      - ZERO_LOG_LEVEL=info
      - ZERO_ENABLE_STARTUP_MESSAGE=0
      - DO_NOT_TRACK=1
    depends_on:
      migrate:
        condition: process_completed_successfully
      bundle-schema:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: node -e "require('net').connect(${ZERO_PORT},'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 3
      period_seconds: 2
      failure_threshold: 90

  # --- Workers. Each gets --port / --inspector-port from its block, and shares the per-worktree
  #     WRANGLER_REGISTRY_PATH (set by the wrapper) so their service bindings resolve within the
  #     worktree but never cross-talk with another worktree's identically-named workers. ---
  sync-worker:
    command: >
      yarn workspace @tldraw/dotcom-worker exec tsx ../../../internal/scripts/workers/dev.ts
      --port ${SYNC_PORT} --inspector-port ${SYNC_INSPECTOR} --persist-to .wrangler/state-dev
      --var IS_LOCAL:true
      --var ASSET_UPLOAD_ORIGIN:${ASSET_UPLOAD_ORIGIN}
      --var USER_CONTENT_URL:${USER_CONTENT_URL}
      --var BOTCOM_POSTGRES_CONNECTION_STRING:${BOTCOM_POSTGRES_CONNECTION_STRING}
      --var BOTCOM_POSTGRES_POOLED_CONNECTION_STRING:${BOTCOM_POSTGRES_POOLED_CONNECTION_STRING}
      --var MULTIPLAYER_SERVER:${CLIENT_ORIGIN}
    depends_on:
      zero-cache:
        condition: process_healthy
    readiness_probe:
      exec:
        command: node -e "require('net').connect(${SYNC_PORT},'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 3
      period_seconds: 2
      failure_threshold: 60

  asset-upload-worker:
    command: >
      yarn workspace dotcom-asset-upload exec tsx ../../../internal/scripts/workers/dev.ts
      --port ${ASSET_PORT} --inspector-port ${ASSET_INSPECTOR} --persist-to tmp-assets

  image-resize-worker:
    command: >
      yarn workspace images.tldraw.com exec tsx ../../../internal/scripts/workers/dev.ts
      --port ${IMAGE_PORT} --inspector-port ${IMAGE_INSPECTOR}
    depends_on:
      sync-worker:
        condition: process_healthy

  tldrawusercontent-worker:
    command: >
      yarn workspace dotcom-tldrawusercontent exec tsx ../../../internal/scripts/workers/dev.ts
      --port ${USERCONTENT_PORT} --inspector-port ${USERCONTENT_INSPECTOR}
    depends_on:
      sync-worker:
        condition: process_healthy

  # client: vite reads CLIENT_PORT (via scripts/dev-app.ts) and bakes MULTIPLAYER_SERVER / ZERO_SERVER
  # / USER_CONTENT_URL (from the wrapper env) into the bundle + uses them for the /api proxy.
  client:
    command: yarn workspace dotcom dev
    depends_on:
      sync-worker:
        condition: process_healthy
      zero-cache:
        condition: process_healthy
