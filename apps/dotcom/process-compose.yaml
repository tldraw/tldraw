# ============================================================================
# Dotcom dev stack — process-compose orchestration
# ============================================================================
# Brings up the dotcom dev stack (client, the four workers, zero-cache, postgres) as
# host processes with declarative depends_on + readiness gating. Only postgres runs in
# a container. process-compose is "docker-compose for processes":
# https://github.com/F1bonacc1/process-compose
#
# Run via `yarn dev-app` from the repo root. See README.process-compose.md for why this
# exists and how to drive it (per-process logs, restart, headless).

version: '0.5'

# Readiness here is "is the port accepting connections", checked with a tiny node TCP
# probe (node is always on PATH; avoids depending on pg_isready/nc, and avoids wrangler's
# `/` returning 404 tripping an http_get probe). This is enough for dependency ordering.

processes:
  # --- Postgres: the one piece that stays containerized (wal2json / logical replication) ---
  postgres:
    command: docker compose -f apps/dotcom/zero-cache/docker/docker-compose.yml up
    shutdown:
      command: docker compose -f apps/dotcom/zero-cache/docker/docker-compose.yml down
    readiness_probe:
      exec:
        command: node -e "require('net').connect(6543,'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 2
      period_seconds: 2
      failure_threshold: 30

  # --- Zero schema bundle: one-shot (zero needs .schema.js) + a watcher to rebuild it ---
  bundle-schema:
    command: yarn workspace @tldraw/zero-cache bundle-schema
    availability:
      restart: 'no' # one-shot; completes

  schema-watch:
    command: yarn workspace @tldraw/zero-cache bundle-schema:watch
    depends_on:
      bundle-schema:
        condition: process_completed_successfully

  # --- Migrations: one-shot. Replaces the `--signal-success` + :7654 readiness server,
  #     which only existed to hand-shake with dev.ts; here it's just process_completed. ---
  migrate:
    command: yarn workspace @tldraw/zero-cache migrate
    depends_on:
      postgres:
        condition: process_healthy
    availability:
      restart: 'no'

  # --- zero-cache: replicates from postgres, restarts on schema change (same nodemon
  #     invocation dev.ts used). Env mirrors zero-cache/.env (host ports — no rewiring). ---
  zero-cache:
    command: yarn workspace @tldraw/zero-cache exec nodemon --watch ./.schema.js --exec zero-cache-dev --signal SIGINT
    environment:
      - ZERO_UPSTREAM_DB=postgresql://user:password@127.0.0.1:6543/postgres
      - ZERO_CVR_DB=postgresql://user:password@127.0.0.1:6543/postgres
      - ZERO_CHANGE_DB=postgresql://user:password@127.0.0.1:6543/postgres
      - ZERO_REPLICA_FILE=/tmp/tldraw-dotcom-zero-dev.db
      - ZERO_NUM_SYNC_WORKERS=1
      - ZERO_APP_PUBLICATIONS=zero_data
      - ZERO_MUTATE_URL=http://localhost:8787/app/zero/mutate
      - ZERO_QUERY_URL=http://localhost:8787/app/zero/query
      - ZERO_ENABLE_CRUD_MUTATIONS=false
      - ZERO_LOG_LEVEL=info
      - ZERO_ENABLE_STARTUP_MESSAGE=0
      - DO_NOT_TRACK=1
    depends_on:
      migrate:
        condition: process_completed_successfully
      bundle-schema:
        condition: process_completed_successfully
    readiness_probe:
      exec:
        command: node -e "require('net').connect(4848,'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 3
      period_seconds: 2
      failure_threshold: 90

  # --- Workers (wrangler dev / workerd on the host). They share one host, so they share one
  #     wrangler dev registry, which is what lets the image-resize / usercontent service bindings
  #     to the sync-worker resolve. ---
  sync-worker:
    command: yarn workspace @tldraw/dotcom-worker dev
    depends_on:
      zero-cache:
        condition: process_healthy
    readiness_probe:
      exec:
        command: node -e "require('net').connect(8787,'127.0.0.1').on('connect',function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
      initial_delay_seconds: 3
      period_seconds: 2
      failure_threshold: 60

  asset-upload-worker:
    command: yarn workspace dotcom-asset-upload dev

  # image-resize + usercontent bind the sync-worker by name; start them after it so it's
  # registered in the wrangler dev registry.
  image-resize-worker:
    command: yarn workspace images.tldraw.com dev
    depends_on:
      sync-worker:
        condition: process_healthy

  tldrawusercontent-worker:
    command: yarn workspace dotcom-tldrawusercontent dev
    depends_on:
      sync-worker:
        condition: process_healthy

  # --- Client: Vite dev server. No readiness gating to hand-roll — depends_on does it. ---
  client:
    command: yarn workspace dotcom dev
    depends_on:
      sync-worker:
        condition: process_healthy
      zero-cache:
        condition: process_healthy
