<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1600px;
    height: 900px;
    background: white;
    font-family: -apple-system, "Helvetica Neue", Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* --- Text slide layout --- */
  .text-slide {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 60px 120px;
    text-align: center;
  }
  .text-slide h1 {
    font-size: 52px;
    font-weight: 700;
    color: #24292f;
    margin-bottom: 32px;
    line-height: 1.3;
  }
  .text-slide h2 {
    font-size: 32px;
    font-weight: 400;
    color: #656d76;
    line-height: 1.5;
    max-width: 900px;
  }
  .text-slide .steps {
    text-align: left;
    margin-top: 32px;
  }
  .text-slide .step {
    font-size: 28px;
    line-height: 2.2;
    color: #24292f;
  }
  .text-slide .step .num {
    color: #8250df;
    font-weight: 700;
    margin-right: 8px;
    font-size: 30px;
  }
  .text-slide .step .detail {
    color: #656d76;
    font-size: 22px;
  }

  /* --- Intro/outro card --- */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
  }
  .card .logo {
    width: 480px;
    margin-bottom: 48px;
  }
  .card .title {
    font-size: 36px;
    color: rgba(0, 0, 0, 0.55);
    font-weight: 400;
    text-align: center;
    max-width: 800px;
    line-height: 1.4;
  }
</style>
</head>
<body>
  <!-- Replace with slide content -->
  <div class="text-slide">
    <h1>Slide title here</h1>
    <h2>Subtitle or description</h2>
  </div>
</body>
</html>
